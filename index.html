<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寶寶固體食物自主計劃</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js"></script>
</head>
<body class="bg-amber-50 text-slate-800 min-h-screen">
    <header class="bg-gradient-to-r from-amber-400 to-orange-400 text-white p-4 shadow-lg">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center gap-2"><i data-lucide="baby"></i> 寶寶固體食物計劃</h1>
            <div class="flex gap-2">
                <button onclick="showTab('planner')" class="px-3 py-1 bg-white/20 rounded-lg text-sm">食譜</button>
                <button onclick="showTab('tracker')" class="px-3 py-1 bg-white/20 rounded-lg text-sm">清單</button>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4">
        <!-- 家庭代碼與連線區 -->
        <div class="bg-white p-4 rounded-xl shadow-sm border border-amber-200 mb-6 flex flex-wrap gap-4 items-center justify-between">
            <div class="flex items-center gap-2">
                <i data-lucide="shield-check" class="text-amber-500"></i>
                <span class="text-sm font-bold text-slate-600">目前家庭 ID:</span>
                <input type="text" id="family-id" value="default-baby-id" class="border p-1 rounded text-sm w-32">
                <button onclick="updateFirebaseConnection()" class="bg-amber-500 text-white px-4 py-1 rounded-lg text-sm font-bold hover:bg-amber-600 transition">確定</button>
            </div>
            <div id="status" class="text-xs text-slate-400">連線初始化中...</div>
        </div>

        <div id="planner-view">
            <h2 class="text-lg font-bold mb-4">每日食譜規劃</h2>
            <div class="bg-white rounded-xl p-6 shadow-sm border">
                <p>食譜內容將顯示於此...</p>
            </div>
        </div>

        <div id="tracker-view" class="hidden">
            <h2 class="text-lg font-bold mb-4">食物總清單</h2>
            <div class="bg-white rounded-xl p-6 shadow-sm border">
                <p>清單內容將顯示於此...</p>
            </div>
        </div>
    </main>

    <script>
        // 初始化 Firebase
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
        const app = firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        async function initAuth() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await auth.signInWithCustomToken(__initial_auth_token);
                } else {
                    await auth.signInAnonymously();
                }
                document.getElementById('status').innerText = "雲端連線成功";
                loadData();
            } catch (e) {
                document.getElementById('status').innerText = "連線失敗，請稍後再試";
            }
        }

        function updateFirebaseConnection() {
            const newId = document.getElementById('family-id').value;
            alert("已切換至家庭 ID: " + newId);
            loadData();
        }

        function loadData() {
            const uid = auth.currentUser?.uid;
            if (!uid) return;
            // 這裡遵循 RULE 1：使用指定的路徑結構
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
            console.log("正在讀取資料路徑：", `artifacts/${appId}/public/data/`);
        }

        function showTab(tab) {
            document.getElementById('planner-view').classList.toggle('hidden', tab !== 'planner');
            document.getElementById('tracker-view').classList.toggle('hidden', tab !== 'tracker');
        }

        window.onload = () => {
            initAuth();
            lucide.createIcons();
        };
    </script>
</body>
</html>
